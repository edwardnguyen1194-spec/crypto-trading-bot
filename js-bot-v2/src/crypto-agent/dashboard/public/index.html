<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Agent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1a2234;
      --border: #1e2d45;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --yellow: #eab308;
      --purple: #a855f7;
      --cyan: #06b6d4;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header h1 span { color: var(--cyan); }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-badge.running { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .status-badge.stopped { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .status-badge.dry { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .metric .label { color: var(--text-dim); }
    .metric .value { font-weight: 600; }
    .metric .value.positive { color: var(--green); }
    .metric .value.negative { color: var(--red); }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(30,45,69,0.5);
    }
    .price-row:last-child { border-bottom: none; }
    .coin-name { font-weight: 600; font-size: 13px; }
    .coin-price { font-size: 13px; color: var(--cyan); }

    .position-card {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 3px solid var(--green);
    }
    .position-card.short { border-left-color: var(--red); }
    .pos-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
    .pos-details { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    /* Chat area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--blue);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.agent {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.log {
      align-self: flex-start;
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      padding: 2px 8px;
      max-width: 100%;
    }
    .msg.error {
      align-self: flex-start;
      background: rgba(239,68,68,0.1);
      color: var(--red);
      font-size: 11px;
      padding: 4px 8px;
      max-width: 100%;
    }
    .msg .time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
      display: block;
    }
    .msg strong { color: var(--cyan); font-weight: 600; }

    /* Input */
    .input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .input-area input:focus { border-color: var(--blue); }
    .input-area input::placeholder { color: var(--text-dim); }
    .input-area button {
      background: var(--blue);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
    }
    .input-area button:hover { background: #2563eb; }

    /* Quick commands */
    .quick-cmds {
      padding: 8px 20px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .quick-cmd {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .quick-cmd:hover { border-color: var(--blue); color: var(--text); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>&#9672;</span> Crypto Trading Agent</h1>
    <div style="display:flex;gap:8px;align-items:center;">
      <div id="modeBadge" class="status-badge dry">DRY RUN</div>
      <div id="statusBadge" class="status-badge stopped">STOPPED</div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Performance</div>
        <div class="metric"><span class="label">Balance</span><span class="value" id="mBalance">$990.50</span></div>
        <div class="metric"><span class="label">Daily P&L</span><span class="value" id="mDailyPnl">$0.00</span></div>
        <div class="metric"><span class="label">Total P&L</span><span class="value" id="mTotalPnl">$0.00</span></div>
        <div class="metric"><span class="label">Win Rate</span><span class="value" id="mWinRate">0.0%</span></div>
        <div class="metric"><span class="label">Wins</span><span class="value positive" id="mWins">0</span></div>
        <div class="metric"><span class="label">Losses</span><span class="value negative" id="mLosses">0</span></div>
        <div class="metric"><span class="label">Trades</span><span class="value" id="mTrades">0</span></div>
        <div class="metric"><span class="label">Profit Factor</span><span class="value" id="mPF">0.00</span></div>
        <div class="metric"><span class="label">Max Drawdown</span><span class="value" id="mDD">0.0%</span></div>
        <div class="metric"><span class="label">Scans</span><span class="value" id="mScans">0</span></div>
      </div>

      <div class="panel">
        <div class="panel-title">Prices</div>
        <div id="pricesList">
          <div class="price-row"><span class="coin-name">BTCUSDT</span><span class="coin-price">--</span></div>
          <div class="price-row"><span class="coin-name">ETHUSDT</span><span class="coin-price">--</span></div>
          <div class="price-row"><span class="coin-name">SOLUSDT</span><span class="coin-price">--</span></div>
          <div class="price-row"><span class="coin-name">XRPUSDT</span><span class="coin-price">--</span></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Open Positions</div>
        <div id="positionsList"><span style="color:var(--text-dim);font-size:12px">No open positions</span></div>
      </div>

      <div class="panel" style="flex:1;overflow-y:auto;">
        <div class="panel-title">Trade History</div>
        <div id="tradeHistory"><span style="color:var(--text-dim);font-size:12px">No trades yet</span></div>
      </div>
    </div>

    <div class="chat-container">
      <div class="messages" id="messages"></div>
      <div class="quick-cmds">
        <button class="quick-cmd" onclick="send('start')">start</button>
        <button class="quick-cmd" onclick="send('stop')">stop</button>
        <button class="quick-cmd" onclick="send('status')">status</button>
        <button class="quick-cmd" onclick="send('positions')">positions</button>
        <button class="quick-cmd" onclick="send('prices')">prices</button>
        <button class="quick-cmd" onclick="send('scan')">scan</button>
        <button class="quick-cmd" onclick="send('analysis BTC')">analyze BTC</button>
        <button class="quick-cmd" onclick="send('analysis ETH')">analyze ETH</button>
        <button class="quick-cmd" onclick="send('risk')">risk</button>
        <button class="quick-cmd" onclick="send('history')">history</button>
        <button class="quick-cmd" onclick="send('intel')">intel</button>
        <button class="quick-cmd" onclick="send('help')">help</button>
      </div>
      <div class="input-area">
        <input type="text" id="chatInput" placeholder="Type a command... (try 'help')" autocomplete="off">
        <button onclick="sendInput()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const chatInput = document.getElementById('chatInput');
    let ws;
    let showLogs = false;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => console.log('Connected to agent');

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        switch (msg.type) {
          case 'chat':
            addMessage(msg.role, msg.text, msg.time);
            break;
          case 'log':
            if (showLogs) addMessage('log', msg.text, msg.time);
            break;
          case 'error':
            addMessage('error', msg.text, msg.time);
            break;
          case 'history':
            for (const m of msg.messages) {
              addMessage(m.role, m.text, m.time);
            }
            break;
          case 'status':
            updateBadges(msg.running, msg.dryRun);
            break;
          case 'status_update':
            updateBadges(msg.running, msg.dryRun);
            updateMetrics(msg.metrics);
            updatePrices(msg.prices);
            updatePositions(msg.positions);
            updateTradeHistory(msg.tradeHistory);
            document.getElementById('mScans').textContent = msg.scans || 0;
            break;
        }
      };

      ws.onclose = () => setTimeout(connect, 3000);
    }

    function addMessage(role, text, time) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      // Simple bold formatting
      const formatted = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      div.innerHTML = formatted;
      if (time && role !== 'log') {
        const timeSpan = document.createElement('span');
        timeSpan.className = 'time';
        timeSpan.textContent = time;
        div.appendChild(timeSpan);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateBadges(running, dryRun) {
      const sb = document.getElementById('statusBadge');
      const mb = document.getElementById('modeBadge');
      sb.className = `status-badge ${running ? 'running' : 'stopped'}`;
      sb.textContent = running ? 'RUNNING' : 'STOPPED';
      mb.className = `status-badge ${dryRun ? 'dry' : 'running'}`;
      mb.textContent = dryRun ? 'DRY RUN' : 'LIVE';
    }

    const STARTING_BALANCE = 200;

    function updateMetrics(m) {
      if (!m) return;
      // Show effective balance (realized + unrealized)
      const effBal = m.effectiveBalance || m.currentBalance;
      document.getElementById('mBalance').textContent = '$' + effBal;
      document.getElementById('mBalance').className = 'value ' + (parseFloat(effBal) >= STARTING_BALANCE ? 'positive' : 'negative');
      const dpnl = document.getElementById('mDailyPnl');
      const dailyTotal = (parseFloat(m.dailyPnL) + parseFloat(m.unrealizedPnL || 0)).toFixed(2);
      dpnl.textContent = (parseFloat(dailyTotal) >= 0 ? '+' : '') + '$' + dailyTotal;
      dpnl.className = 'value ' + (parseFloat(dailyTotal) >= 0 ? 'positive' : 'negative');
      // Total P&L = current balance - original $200 starting balance
      const tpnl = document.getElementById('mTotalPnl');
      const realTotalPnl = (parseFloat(effBal) - STARTING_BALANCE).toFixed(2);
      tpnl.textContent = (parseFloat(realTotalPnl) >= 0 ? '+' : '') + '$' + realTotalPnl;
      tpnl.className = 'value ' + (parseFloat(realTotalPnl) >= 0 ? 'positive' : 'negative');
      document.getElementById('mWinRate').textContent = m.winRate + '%';
      document.getElementById('mWins').textContent = m.wins || 0;
      document.getElementById('mLosses').textContent = m.losses || 0;
      document.getElementById('mTrades').textContent = m.totalTrades;
      document.getElementById('mPF').textContent = m.profitFactor;
      document.getElementById('mDD').textContent = m.maxDrawdown + '%';
    }

    function updatePrices(prices) {
      if (!prices) return;
      const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'XRPUSDT'];
      let html = '';
      for (const s of symbols) {
        const p = prices[s];
        const price = p ? parseFloat(p.lastPrice || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '--';
        html += `<div class="price-row"><span class="coin-name">${s.replace('USDT','')}</span><span class="coin-price">$${price}</span></div>`;
      }
      document.getElementById('pricesList').innerHTML = html;
    }

    function updatePositions(positions) {
      if (!positions || positions.length === 0) {
        document.getElementById('positionsList').innerHTML = '<span style="color:var(--text-dim);font-size:12px">No open positions</span>';
        return;
      }
      let html = '';
      for (const p of positions) {
        const pnl = p.unrealizedPnL || 0;
        const pnlPct = p.pnlPercent || 0;
        const pnlColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const pnlSign = pnl >= 0 ? '+' : '';
        const cls = p.direction === 'SHORT' ? 'short' : '';
        html += `<div class="position-card ${cls}">
          <div class="pos-header">
            <span>${p.direction} ${p.symbol}</span>
            <span style="color:${pnlColor};font-weight:700">${pnlSign}$${pnl.toFixed(2)}</span>
          </div>
          <div class="pos-details">
            Entry: $${p.entry.toFixed(2)} → $${(p.currentPrice || p.entry).toFixed(2)} | ${p.leverage}x | ${pnlSign}${pnlPct.toFixed(2)}%
          </div>
          <div class="pos-details" style="opacity:0.6">
            SL: $${p.sl.toFixed(2)} | TP: $${p.tp.toFixed(2)}${p.breakEvenMoved ? ' | BE ✓' : ''}
          </div>
        </div>`;
      }
      document.getElementById('positionsList').innerHTML = html;
    }

    function updateTradeHistory(trades) {
      if (!trades || trades.length === 0) {
        document.getElementById('tradeHistory').innerHTML = '<span style="color:var(--text-dim);font-size:12px">No trades yet</span>';
        return;
      }
      let html = '';
      for (const t of trades) {
        const color = t.pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const icon = t.pnl >= 0 ? '&#9650;' : '&#9660;';
        const dur = Math.round(t.duration / 60000);
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(30,45,69,0.5);font-size:11px;">
          <div>
            <span style="color:${color}">${icon}</span>
            <span style="font-weight:600">${t.direction} ${t.symbol.replace('USDT','')}</span>
            <span style="color:var(--text-dim)">${t.leverage}x</span>
          </div>
          <span style="color:${color};font-weight:700">${t.pnl >= 0 ? '+' : ''}$${t.pnl}</span>
        </div>`;
      }
      document.getElementById('tradeHistory').innerHTML = html;
    }

    function send(text) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'chat', text }));
      }
    }

    function sendInput() {
      const text = chatInput.value.trim();
      if (!text) return;
      send(text);
      chatInput.value = '';
    }

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendInput();
    });

    connect();
  </script>
</body>
</html>
