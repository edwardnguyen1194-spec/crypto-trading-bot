name: Deploy JS Bot v2 to Fly.io

on:
  push:
    branches:
      - main
      - master
      - claude/crypto-trading-bot-CJhjV
    paths:
      - 'js-bot-v2/**'
      - '.github/workflows/deploy-fly.yml'
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  FLY_APP: bitunix-crypto-agent-v2
  FLY_REGION: iad

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./js-bot-v2

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        shell: bash
        working-directory: /tmp
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
          "$HOME/.fly/bin/fly" version

      - name: Diagnose environment
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set +e
          echo "=== which fly ==="
          which fly || echo "fly not in PATH"
          echo "=== fly version ==="
          fly version || echo "fly version failed rc=$?"
          echo "=== FLY_API_TOKEN check (no value printed) ==="
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is EMPTY — secret is missing or not named FLY_API_TOKEN"
          else
            TOK_LEN=${#FLY_API_TOKEN}
            TOK_PREFIX="${FLY_API_TOKEN:0:5}"
            echo "FLY_API_TOKEN is set, length=$TOK_LEN, starts_with='$TOK_PREFIX'"
            if [[ "$TOK_PREFIX" != "FlyV1" ]]; then
              echo "WARNING: token doesn't start with 'FlyV1' — probably wrong format"
            fi
          fi
          echo "=== fly auth whoami ==="
          fly auth whoami
          WHOAMI_RC=$?
          echo "whoami rc=$WHOAMI_RC"
          echo "=== done ==="
          exit 0

      - name: Fail if auth is broken
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if ! fly auth whoami >/dev/null 2>&1; then
            echo "::error::FLY_API_TOKEN is set but Fly rejects it. Token is likely revoked or invalid. Generate a new one at fly.io/user/personal_access_tokens and update the GitHub secret."
            exit 1
          fi
          echo "Fly auth OK as: $(fly auth whoami)"

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set +e
          echo "Checking if app $FLY_APP exists and is accessible..."
          if fly status --app "$FLY_APP" >/dev/null 2>&1; then
            echo "App $FLY_APP already exists and is accessible — skipping create"
            exit 0
          fi
          echo "App not found via fly status — attempting to create..."
          CREATE_OUTPUT=$(fly apps create "$FLY_APP" 2>&1)
          CREATE_EXIT=$?
          echo "$CREATE_OUTPUT"
          if [ $CREATE_EXIT -eq 0 ]; then
            echo "App $FLY_APP created successfully"
            exit 0
          fi
          # If creation failed because the name is already taken by someone else,
          # we can't recover. Otherwise (e.g., we own it but status flaked), retry status.
          if echo "$CREATE_OUTPUT" | grep -qi "taken\|already exists\|slug.*already"; then
            echo "App name may already exist — rechecking with fly status..."
            if fly status --app "$FLY_APP" >/dev/null 2>&1; then
              echo "Confirmed: app exists and we own it"
              exit 0
            fi
            echo "ERROR: App name '$FLY_APP' is taken by another account."
            echo "Change FLY_APP in the workflow to a unique name and retry."
            exit 1
          fi
          echo "ERROR: fly apps create failed for unknown reason"
          exit 1

      - name: Create persistent volume if missing
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if fly volumes list --app "$FLY_APP" --json 2>/dev/null | grep -q '"name": *"bot_state"'; then
            echo "Volume bot_state already exists — skipping create"
          else
            echo "Creating volume bot_state..."
            fly volumes create bot_state --size 1 --region "$FLY_REGION" --app "$FLY_APP" --yes
          fi

      - name: Stage API secrets (applied on next deploy)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          BITUNIX_API_KEY: ${{ secrets.BITUNIX_API_KEY }}
          BITUNIX_SECRET_KEY: ${{ secrets.BITUNIX_SECRET_KEY }}
        run: |
          if [ -n "$BITUNIX_API_KEY" ] && [ -n "$BITUNIX_SECRET_KEY" ]; then
            fly secrets set \
              BITUNIX_API_KEY="$BITUNIX_API_KEY" \
              BITUNIX_SECRET_KEY="$BITUNIX_SECRET_KEY" \
              --app "$FLY_APP" --stage
            echo "Bitunix secrets staged"
          else
            echo "Bitunix secrets not set in GitHub — bot will run in DRY_RUN mode only"
          fi

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly deploy \
            --app "$FLY_APP" \
            --remote-only \
            --yes \
            --wait-timeout 600

      - name: Show app status
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: fly status --app "$FLY_APP"

      - name: Print dashboard URL
        run: |
          echo "============================================"
          echo "Bot v2 dashboard: https://$FLY_APP.fly.dev"
          echo "Compare with v1: https://crypto-trading-bot-production-55b3.up.railway.app/"
          echo "============================================"
